# Fly.io configuration for Portkit
# Deploy with: fly deploy

app = "portkit-backend"
primary_region = "iad"

# Build configuration
[build]
  dockerfile = "Dockerfile.fly"

[build.args]
  PYTHON_VERSION = "3.11"

# Database migrations - temporarily disabled for deployment
# [deploy]
#   release_command = "sh /app/scripts/run-migrations.sh"

# Process groups
# "app" runs nginx + backend API + AI engine via the startup script
# "worker" runs Celery background jobs
[processes]
  app = "/startup.sh"
  worker = "sh -c 'cd /app/backend && PYTHONPATH=/usr/lib/python3.11/site-packages:/app/backend python -m celery -A src.services.celery_config worker --loglevel=info'"

# Environment variables applied to all processes
[env]
  PYTHONUNBUFFERED = "1"

# Persistent volume for uploads, conversions, and SQLite fallback
[mounts]
  source = "portkit_data"
  destination = "/app/data"
  initial_size = "1gb"

# HTTP service: Fly terminates TLS and forwards plain HTTP to nginx on port 80
[[services]]
  processes = ["app"]
  internal_port = 80
  protocol = "tcp"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.checks]]
    path = "/health"
    interval = "30s"
    timeout = "10s"
    retries = 3
