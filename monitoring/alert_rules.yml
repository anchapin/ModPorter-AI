# Alert Rules for Portkit
# Issue: #457 - Monitoring Dashboards with Grafana/Prometheus (Phase 3)

groups:
  - name: portkit_conversion_alerts
    interval: 30s
    rules:
      # Conversion success rate alert
      - alert: ConversionSuccessRateLow
        expr: portkit_conversion_success_rate < 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Conversion success rate is below 80%"
          description: "Current success rate: {{ $value | printf \"%.1f\" }}%"

      # High error rate alert
      - alert: HighConversionErrorRate
        expr: rate(portkit_conversion_jobs_total{status="failed"}[5m]) > 0.1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High conversion error rate detected"
          description: "Error rate is {{ $value | printf \"%.2f\" }} per second"

      # Conversion timeout alert
      - alert: ConversionTimeout
        expr: portkit_conversion_duration_seconds > 180
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Conversion taking too long"
          description: "Conversion duration exceeds 3 minutes"

  - name: portkit_performance_alerts
    interval: 30s
    rules:
      # API response time alert
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(portkit_http_request_duration_seconds_bucket[5m])) > 0.2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "API response time (p95) is above 200ms"
          description: "Current p95 response time: {{ $value | printf \"%.3f\" }}s"

      # Queue size alert
      - alert: ConversionQueueBacklog
        expr: portkit_conversion_queue_size > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Conversion queue has a large backlog"
          description: "Queue size: {{ $value }}"

  - name: portkit_llm_alerts
    interval: 60s
    rules:
      # High LLM cost alert (converted to hourly rate)
      - alert: HighLLMCost
        expr: rate(portkit_llm_cost_dollars[1h]) * 3600 > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High LLM API cost detected"
          description: "Current cost rate: ${{ $value | printf \"%.2f\" }}/hour"

      # Token usage alert (converted to per-minute rate)
      - alert: HighTokenUsage
        expr: rate(portkit_llm_tokens_total[5m]) * 60 > 100000
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "High token usage detected"
          description: "Token usage rate: {{ $value | printf \"%.0f\" }}/min"

  - name: portkit_system_alerts
    interval: 30s
    rules:
      # Active conversions limit
      - alert: TooManyActiveConversions
        expr: portkit_active_conversions > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Too many active conversions"
          description: "Active conversions: {{ $value }}"

      # Database performance
      - alert: HighDatabaseLatency
        expr: histogram_quantile(0.95, rate(portkit_db_operation_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database latency detected"
          description: "DB p95 latency: {{ $value | printf \"%.3f\" }}s"

      # Cache hit rate (multiplied by 100 for percentage)
      - alert: LowCacheHitRate
        expr: (rate(portkit_cache_operations_total{operation="hit"}[5m]) / rate(portkit_cache_operations_total[5m])) * 100 < 50
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate: {{ $value | printf \"%.1f\" }}%"

  - name: portkit_backup_alerts
    interval: 60s
    rules:
      # Backup too old - critical if no backup in 25 hours
      - alert: BackupTooOld
        expr: (time() - postgres_last_backup_timestamp) > 90000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No database backup in 25 hours"
          description: "Last successful backup was {{ $value | printf \"%.0f\" }} seconds ago. Check backup script and S3 connectivity."

      # Backup verification failed
      - alert: BackupVerificationFailed
        expr: postgres_backup_verification_status == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database backup verification failed"
          description: "The latest backup failed integrity verification. Do not rely on this backup for restore."

      # Backup upload to S3 failed
      - alert: BackupUploadFailed
        expr: postgres_backup_s3_upload_status == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backup S3 upload failed"
          description: "Latest backup uploaded to local storage but S3 upload failed. Offsite backup may be missing."

      # PostgreSQL down
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL is not responding to health checks. Immediate investigation required."

      # Database connection pool exhausted
      - alert: DatabasePoolExhausted
        expr: rate(pg_stat_activity_count{state="active"}[5m]) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Active connections approaching pool limit. May indicate connection leak or high load."

  - name: portkit_recovery_alerts
    interval: 60s
    rules:
      # PITR WAL archival lag
      - alert: WALArchivalLagging
        expr: (pg_wal_lsn_diff(pg_current_wal_lsn(), pg_last_wal_receive_lsn()) / 1024 / 1024) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WAL archival is lagging"
          description: "WAL receive lag exceeds 100MB. PITR recovery may be limited."

      # Replication lag (if replicas configured)
      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag_seconds > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL replication lag exceeds 5 seconds"
          description: "Replica is more than 5 seconds behind primary. Check replica health."
