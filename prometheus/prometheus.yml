global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'portkit'
    environment: 'production'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: backend
    static_configs:
      - targets: [backend:8080]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
    metrics_path: /metrics

  - job_name: node_exporter
    static_configs:
      - targets: [node-exporter:9100]
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/backup_rules.yml