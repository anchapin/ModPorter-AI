[tool:pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --timeout=300
    --cov=.
    --cov-report=json
    --cov-fail-under=70
    -n auto
    --dist=loadfile
markers =
    unit: Unit tests
    integration: Integration tests
    integration_docker: Docker-based integration tests
    slow: Slow running tests
    performance: Performance tests
    asyncio: Async tests
    ai: Tests that use AI services (may be slow/expensive)
    serial: Tests that must run serially (not in parallel) due to shared state
    docker: Tests that require docker services (PostgreSQL with pgvector, Redis)
    real_service: Tests that require real services (PostgreSQL, Redis) - skipped unless USE_REAL_SERVICES=1
    e2e: End-to-end tests
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pytest.PytestDeprecationWarning