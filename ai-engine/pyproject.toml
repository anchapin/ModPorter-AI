[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    "tests/",
    "src/tests/",
    ".git/",
    "__pycache__/",
    "*.egg-info/",
    ".venv/",
    "venv/",
]

[tool.ruff.lint]
# Enable pycodestyle (E), Pyflakes (F), isort (I), and flake8-quotes (Q)
select = ["E", "F", "I", "Q", "N"]
ignore = [
    "E402",  # module level import not at top of file
    "E501",  # line too long (handled by formatter)
    "Q000",  # bad quote marks
    "Q001",  # bad quote marks in multiline strings
    "Q002",  # bad quote marks in strings
    "N999",  # invalid module name (e.g., ai-engine with hyphen)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402", "F401"]  # Allow imports not at top and unused imports in tests
"__init__.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["src"]
force-single-line = false
order-by-type = false
case-sensitive = false