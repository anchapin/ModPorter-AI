# Fly.io configuration for Portkit Staging
# Deploy with: flyctl deploy -c fly-staging.toml

app = "portkit-backend-staging"
primary_region = "iad"

# Build configuration
[build]
  dockerfile = "Dockerfile.fly"

[build.args]
  PYTHON_VERSION = "3.11"
  VITE_API_URL = "https://staging-api.portkit.cloud/api/v1"
  VITE_API_BASE_URL = "https://staging-api.portkit.cloud"

# No database migrations for staging (uses separate database)
# [deploy]
#   release_command = "cd /app/backend && alembic upgrade head"

# Process groups
[processes]
  app = "/startup.sh"
  worker = "sh -c 'cd /app/backend && PYTHONPATH=/app/backend celery -A src.services.celery_config worker --loglevel=info --autoscale=4,1'"

# Environment variables for staging
[env]
  PYTHONUNBUFFERED = "1"
  ENVIRONMENT = "staging"
  LOG_LEVEL = "DEBUG"
  AI_ENGINE_EXTRACTED = "1"
  AI_ENGINE_UPSTREAM = "portkit-ai-engine-staging.internal:8001"

# Persistent volume for staging (smaller size)
[mounts]
  source = "portkit_staging_data"
  destination = "/app/data"
  initial_size = "512mb"

# HTTP service: Staging domain
[[services]]
  processes = ["app"]
  internal_port = 80
  protocol = "tcp"
  auto_stop_machines = "true"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 3

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.concurrency]]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[services.checks]]
    path = "/health"
    interval = "30s"
    timeout = "10s"
    retries = 3
