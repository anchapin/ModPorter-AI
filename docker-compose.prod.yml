services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portkit-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '8080:8000'
    environment:
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/portkit
      - LOG_LEVEL=INFO
      - FEATURE_USER_ACCOUNTS=true
      - SKIP_EMAIL_VERIFICATION=true
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-change-in-production}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - S3_BUCKET=${S3_BUCKET:-portkit-data}
      - AWS_REGION=${AWS_REGION:-auto}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - portkit-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  clamav:
    image: clamav/clamav:1.3
    ports:
      - '3310:3310'
    environment:
      - CLAMD_CONF=/etc/clamav/clamd.conf
      - CLAMAV_NO_CLAMD=0
      - CLAMAV_NO_FRESHCLAMD=1
    volumes:
      - clamav-db:/var/lib/clamav
    networks:
      - portkit-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'clamdscan', '--ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=INFO
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - S3_BUCKET=${S3_BUCKET:-portkit-data}
      - AWS_REGION=${AWS_REGION:-auto}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - portkit-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - portkit-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=portkit
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - portkit-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d portkit']
      interval: 10s
      timeout: 3s
      retries: 3

  # Monitoring and observability services
  prometheus:
    image: prom/prometheus:latest
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - portkit-network
    restart: unless-stopped
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - portkit-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Node exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - portkit-network
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # Redis exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    ports:
      - '9121:9121'
    networks:
      - portkit-network
    restart: unless-stopped
    depends_on:
      - redis
    command:
      - '--redis-url=redis://redis:6379'
      - '--broker-url=redis://redis:6379'
      - '--port=9540'

  # cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - '8080:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - portkit-network
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  clamav-db:
    driver: local

networks:
  portkit-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
