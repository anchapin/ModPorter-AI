# =============================================================================
# Gitleaks Configuration for ModPorter-AI
# =============================================================================
# Uses gitleaks' built-in rules by default.
# Custom rules and allowlists defined below.

# ----------------------------------------------------------------
# Path Allowlist (don't scan these paths)
# ----------------------------------------------------------------
[allowlist]
paths = [
  "^\\.git/",
  "^\\.venv/",
  "^node_modules/",
  "^frontend/node_modules/",
  "^ai-engine/src/",
  "^\\.pytest_cache/",
  "^\\.ruff_cache/",
  "^tests/",
  "^docs/",
  "^docker/",
  "^\\.github/",
  "^\\.worktrees/",
  "^\\.claude/worktrees/",
  "coverage\\.json",
  "\\.log$"
]

# ----------------------------------------------------------------
# Regex Allowlist (false positives)
# ----------------------------------------------------------------
[[rules.allowlist]]
description = "Test/example placeholders"
regex = '''test[_-]?secret[_-]?key[_-]?for[_-]?testing'''

[[rules.allowlist]]
description = "Example passwords in documentation"
regex = '''password\\s*=\\s*['\"]?example'''

[[rules.allowlist]]
description = "Placeholder values"
regex = '''['\"]?changeme['\"]?'''

[[rules.allowlist]]
description = "Dummy values"
regex = '''['\"]?dummy[_-]?value['\"]?'''

[[rules.allowlist]]
description = "Common test patterns"
regex = '''fake[_-]?(secret|token|key|api[_-]?key)'''

[[rules.allowlist]]
description = "Placeholder secrets"
regex = '''['\"]?your[_-]?(secret|token|key)['\"]?'''

# ----------------------------------------------------------------
# Files to always skip
# ----------------------------------------------------------------
[[rules.allowlist]]
files = [
  "\\.gitleaks\\.toml$",
  "passwords\\.txt$",
  "secrets\\.txt$",
  "\\.log$",
  "\\.tmp$",
  "coverage\\.json$",
  "\\.ruff_cache/",
  "\\.pytest_cache/"
]
