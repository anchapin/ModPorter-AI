# =============================================================================
# Gitleaks Configuration for ModPorter-AI
# =============================================================================
# Uses gitleaks' built-in rules by default.
# Custom rules and allowlists defined below.

# ----------------------------------------------------------------
# Path Allowlist (don't scan these paths)
# ----------------------------------------------------------------
[allowlist]
description = "Paths to skip scanning"
paths = [
  '''\.git/''',
  '''\.venv/''',
  '''node_modules/''',
  '''frontend/node_modules/''',
  '''ai-engine/src/''',
  '''\.pytest_cache/''',
  '''\.ruff_cache/''',
  '''tests/''',
  '''docs/''',
  '''docker/''',
  '''\.github/''',
  '''\.worktrees/''',
  '''\.claude/worktrees/''',
  '''coverage\.json$''',
  '''\.log$''',
  '''\.tmp$''',
  '''\.mypy_cache/''',
  '''\.tox/''',
  '''\.eggs/''',
  '''\.coverage$''',
  '''\.coverage\..*''',
  '''\.hypothesis/''',
  '''\.pytype/''',
  '''\.direnv/''',
  '''\.envrc''',
  '''\.env$''',
  '''\.secrets''',
  '''\.egg-info/''',
  '''build/''',
  '''dist/''',
  '''\.next/''',
  '''\.nuxt/''',
  '''\.output/''',
  '''coverage/''',
  '''\.devcontainer/''',
  '''\.idea/''',
  '''\.vscode/''',
  '''\.vs/''',
  '''\.settings/''',
  '''\.classpath''',
  '''\.project''',
  '''\.sts4/''',
  '''\.gradle/''',
  '''\.auto/''',
  '''\.openapi-generator/''',
  '''\.swagger-editor/''',
  '''frontend/pnpm-lock\.yaml$''',
  '''frontend/yarn\.lock$''',
  '''frontend/package-lock\.json$''',
  '''backend/requirements\.txt$''',
  '''ai-engine/requirements\.txt$''',
]

# ----------------------------------------------------------------
# Regex Allowlist (false positives) - use [[allowlist.regex]] array tables
# ----------------------------------------------------------------
[[allowlist.regex]]
description = "Test/example placeholders"
regex = '''test[_-]?secret[_-]?key[_-]?for[_-]?testing'''

[[allowlist.regex]]
description = "Example passwords in documentation"
regex = '''password\s*=\s*['"]?example'''

[[allowlist.regex]]
description = "Placeholder values"
regex = '''['"]?changeme['"]?'''

[[allowlist.regex]]
description = "Dummy values"
regex = '''['"]?dummy[_-]?value['"]?'''

[[allowlist.regex]]
description = "Common test patterns"
regex = '''fake[_-]?(secret|token|key|api[_-]?key)'''

[[allowlist.regex]]
description = "Placeholder secrets"
regex = '''['"]?your[_-]?(secret|token|key)['"]?'''

[[allowlist.regex]]
description = "Example AWS keys in docs"
regex = '''AKIA[0-9A-Z]{16}'''

[[allowlist.regex]]
description = "Generic API key patterns in test files"
regex = '''api[_-]?key['"]?\s*[:=]\s*['"]?test'''
