# RL Training Config for PortKit Mod Conversion
# Based on qwen-3-5-moe-advanced.toml starter recipe

model = "Qwen/Qwen3.5-4B"

max_steps = 100
batch_size = 64
rollouts_per_example = 8

[sampling]
max_tokens = 2048

[[env]]
id = "portkit-mod-convert"

[eval]
interval = 20
num_examples = 32
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "portkit-mod-convert"

[buffer]
online_difficulty_filtering = false