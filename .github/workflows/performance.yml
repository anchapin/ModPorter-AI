name: Build Performance Tracking

on:
  workflow_run:
    workflows:
      - "CI - Integration Tests (Optimized)"
      - "Deploy ModPorter AI"
      - "Build Base Images"
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      workflow_name:
        description: 'Workflow to analyze'
        required: false
        default: ''
      days:
        description: 'Number of days to analyze'
        required: false
        default: '30'

jobs:
  aggregate-metrics:
    name: Aggregate Performance Metrics
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch workflow runs
        id: fetch-runs
        run: |
          # Get workflow runs from the last 30 days
          WORKFLOW_NAME="${{ github.event.workflow_run.name || github.event.inputs.workflow_name }}"
          DAYS="${GITHUB_EVENT_DAYS:-30}"
          
          # Fetch recent workflow runs
          gh run list --workflow "${WORKFLOW_NAME}" \
            --limit 50 \
            --status success \
            --json runNumber,createdAt,duration,conclusion \
            > workflow_runs.json
          
          echo "Fetched $(jq length workflow_runs.json) workflow runs"
          
          # Calculate average duration
          AVG_DURATION=$(jq '[.[] | select(.duration != null) | .duration] | add / length' workflow_runs.json 2>/dev/null || echo "0")
          echo "Average duration: ${AVG_DURATION}s"
          
          # Get latest run duration
          LATEST_DURATION=$(jq -r '.[0].duration // 0' workflow_runs.json)
          echo "Latest duration: ${LATEST_DURATION}s"
          
          # Get run count
          RUN_COUNT=$(jq length workflow_runs.json)
          echo "Total runs: ${RUN_COUNT}"
          
          # Calculate min, max for trend analysis
          MIN_DURATION=$(jq '[.[] | select(.duration != null) | .duration] | min' workflow_runs.json 2>/dev/null || echo "0")
          MAX_DURATION=$(jq '[.[] | select(.duration != null) | .duration] | max' workflow_runs.json 2>/dev/null || echo "0")
          echo "Min duration: ${MIN_DURATION}s"
          echo "Max duration: ${MAX_DURATION}s"
          
          # Store for next steps
          echo "avg_duration=${AVG_DURATION}" >> $GITHUB_OUTPUT
          echo "latest_duration=${LATEST_DURATION}" >> $GITHUB_OUTPUT
          echo "run_count=${RUN_COUNT}" >> $GITHUB_OUTPUT
          echo "min_duration=${MIN_DURATION}" >> $GITHUB_OUTPUT
          echo "max_duration=${MAX_DURATION}" >> $GITHUB_OUTPUT

      - name: Analyze performance trends
        id: trends
        run: |
          # Calculate trend (last 5 runs vs previous 5 runs)
          LAST_5_AVG=$(jq -s '.[:5] | map(select(.duration != null)) | map(.duration) | add / length' workflow_runs.json 2>/dev/null || echo "0")
          PREV_5_AVG=$(jq -s '.[5:10] | map(select(.duration != null)) | map(.duration) | add / length' workflow_runs.json 2>/dev/null || echo "0")
          
          if [ "$LAST_5_AVG" != "0" ] && [ "$PREV_5_AVG" != "0" ]; then
            TREND_DIFF=$((LAST_5_AVG - PREV_5_AVG))
            if [ $TREND_DIFF -gt 60 ]; then
              TREND_STATUS="📈 Increasing (slower)"
            elif [ $TREND_DIFF -lt -60 ]; then
              TREND_STATUS="📉 Decreasing (faster)"
            else
              TREND_STATUS="➡️ Stable"
            fi
          else
            TREND_STATUS="⚠️ Insufficient data"
            TREND_DIFF=0
          fi
          
          echo "Last 5 runs avg: ${LAST_5_AVG}s"
          echo "Previous 5 runs avg: ${PREV_5_AVG}s"
          echo "Trend: ${TREND_STATUS} (${TREND_DIFF}s)"
          
          echo "trend_status=${TREND_STATUS}" >> $GITHUB_OUTPUT
          echo "trend_diff=${TREND_DIFF}" >> $GITHUB_OUTPUT
          echo "last_5_avg=${LAST_5_AVG}" >> $GITHUB_OUTPUT
          echo "prev_5_avg=${PREV_5_AVG}" >> $GITHUB_OUTPUT

      - name: Generate performance summary
        id: summary
        run: |
          # Calculate durations in human readable format
          latest_min=$(({{ steps.fetch-runs.outputs.latest_duration }} / 60))
          latest_sec=$(({{ steps.fetch-runs.outputs.latest_duration }} % 60))
          avg_min=$(({{ steps.fetch-runs.outputs.avg_duration }} / 60))
          avg_sec=$(({{ steps.fetch-runs.outputs.avg_duration }} % 60))
          
          cat > performance_summary.md << 'EOF'
          # Build Performance Summary
          
          ## Latest Run Metrics
          
          | Metric | Value |
          |--------|-------|
          | Run Duration | ${{ steps.fetch-runs.outputs.latest_duration }}s (~${latest_min}m ${latest_sec}s) |
          | Average Duration | ${{ steps.fetch-runs.outputs.avg_duration }}s (~${avg_min}m ${avg_sec}s) |
          | Min Duration | ${{ steps.fetch-runs.outputs.min_duration }}s |
          | Max Duration | ${{ steps.fetch-runs.outputs.max_duration }}s |
          | Total Runs | ${{ steps.fetch-runs.outputs.run_count }} |
          
          ## Performance Trends
          
          | Period | Average Duration |
          |--------|-------------------|
          | Last 5 runs | ${{ steps.trends.outputs.last_5_avg }}s |
          | Previous 5 runs | ${{ steps.trends.outputs.prev_5_avg }}s |
          | Trend | ${{ steps.trends.outputs.trend_status }} (${{ steps.trends.outputs.trend_diff }}s) |
          
          ## Performance Insights
          
          This report is automatically generated for each successful CI run.
          
          ### How to Use This Data
          
          - Monitor build times to detect regressions
          - Compare durations across different branches
          - Track performance improvements over time
          - Use the trend analysis to identify patterns
          
          ### Tips for Faster Builds
          
          1. **Use caching** - Dependencies are cached between runs
          2. **Optimize dependencies** - Only install what's needed
          3. **Parallel jobs** - Tests run in parallel when possible
          4. **Base images** - Pre-built images speed up setup
          
          ---
          *Generated by GitHub Actions Performance Tracking*
          EOF
          
          cat performance_summary.md

      - name: Upload performance data
        uses: actions/upload-artifact@v4
        with:
          name: performance-summary
          path: |
            performance_summary.md
            workflow_runs.json
          retention-days: 30

      - name: Post comment on PR
        if: ${{ github.event.workflow_run.event == 'pull_request' }}
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          
          # Calculate durations in human readable format
          latest_min=$((${{ steps.fetch-runs.outputs.latest_duration }} / 60))
          latest_sec=$((${{ steps.fetch-runs.outputs.latest_duration }} % 60))
          avg_min=$((${{ steps.fetch-runs.outputs.avg_duration }} / 60))
          avg_sec=$((${{ steps.fetch-runs.outputs.avg_duration }} % 60))
          
          # Create performance comment
          COMMENT_BODY=$(cat << EOMESSAGE
          ## 📊 Build Performance Metrics
          
          | Metric | Value |
          |--------|-------|
          | Latest Duration | ~${latest_min}m ${latest_sec}s (${{ steps.fetch-runs.outputs.latest_duration }}s) |
          | Average Duration | ~${avg_min}m ${avg_sec}s (${{ steps.fetch-runs.outputs.avg_duration }}s) |
          | Runs Analyzed | ${{ steps.fetch-runs.outputs.run_count }} |
          | Performance Trend | ${{ steps.trends.outputs.trend_status }} (${{ steps.trends.outputs.trend_diff }}s) |
          
          ### Performance Tracking
          
          This run is being tracked for performance analysis. Check the "Build Performance Tracking" workflow for detailed reports.
          
          *Generated by GitHub Actions Performance Tracking*
          EOMESSAGE
          )
          
          # Post comment
          gh pr comment "${PR_NUMBER}" --body "${COMMENT_BODY}"
          
          echo "Performance comment posted to PR #${PR_NUMBER}"

  track-duration:
    name: Track Step Durations
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: performance-metrics
          path: ./metrics
        continue-on-error: true

      - name: Analyze step durations
        if: hashFiles('./metrics/**/*.json') != ''
        run: |
          echo "## Step Duration Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Find all JSON files and extract step durations
          for file in $(find ./metrics -name "*.json" -type f); do
            echo "Analyzing: $file"
            jq -r '.steps[] | "\(.name): \(.duration_seconds)s"' "$file" 2>/dev/null || true
          done
          
          echo "Step duration analysis complete"

  performance-insights:
    name: Generate Performance Insights
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch workflow data
        run: |
          DAYS="${{ github.event.inputs.days }}"
          WORKFLOW="${{ github.event.inputs.workflow_name }}"
          
          echo "Analyzing workflow: ${WORKFLOW:-all}"
          echo "Days to analyze: ${DAYS}"
          
          # Get workflow runs
          if [ -n "${WORKFLOW}" ]; then
            gh run list --workflow "${WORKFLOW}" \
              --created "$(date -d "${DAYS} days ago" +%Y-%m-%d)" \
              --status success \
              --json runNumber,createdAt,duration,conclusion \
              > insights.json
          else
            gh run list \
              --created "$(date -d "${DAYS} days ago" +%Y-%m-%d)" \
              --status success \
              --json runNumber,createdAt,duration,conclusion,name \
              > insights.json
          fi
          
          # Display summary
          TOTAL_RUNS=$(jq length insights.json)
          AVG_DURATION=$(jq '[.[] | select(.duration != null) | .duration] | add / length' insights.json 2>/dev/null || echo "0")
          
          echo "## Performance Insights" | tee insights.md
          echo "" | tee -a insights.md
          echo "**Analysis Period**: Last ${DAYS} days" | tee -a insights.md
          echo "**Total Successful Runs**: ${TOTAL_RUNS}" | tee -a insights.md
          echo "**Average Duration**: ${AVG_DURATION}s (~$((AVG_DURATION / 60))m)" | tee -a insights.md
          echo "" | tee -a insights.md
          
          # Show recent runs
          echo "### Recent Runs" | tee -a insights.md
          echo "" | tee -a insights.md
          jq -r '.[:10] | .[] | "- Run #\(.runNumber): \(.duration)s (\(.createdAt))"' insights.json | tee -a insights.md

      - name: Upload insights
        uses: actions/upload-artifact@v4
        with:
          name: performance-insights
          path: insights.json
          retention-days: 90
