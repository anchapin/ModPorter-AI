name: Security Scanning

'on':
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan on Sunday
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # =============================================================================
  # SAST: Static Application Security Testing (Bandit)
  # =============================================================================
  bandit-sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install --timeout=300 bandit

      - name: Run Bandit SAST
        run: |
          bandit -r \
            --severity-level=high \
            --confidence-level=high \
            --exclude="tests/,.venv/,node_modules/,frontend/,ai-engine/src/" \
            --output "bandit-results.json" \
            --format json \
            . || true

      - name: Publish Bandit results
        if: always()
        run: |
          if [ -f bandit-results.json ]; then
            # Count issues
            HIGH=$(grep -o '"HIGH"' bandit-results.json | wc -l || echo "0")
            MEDIUM=$(grep -o '"MEDIUM"' bandit-results.json | wc -l || echo "0")
            echo "Bandit findings: HIGH=$HIGH, MEDIUM=$MEDIUM"
            
            # Convert to SARIF for GitHub annotations
            bandit -r \
              --severity-level=medium,high,critical \
              --confidence-level=medium,high \
              --exclude="tests/,.venv/,node_modules/,frontend/,ai-engine/src/" \
              --output "bandit-sarif.json" \
              --format sarif \
              . 2>/dev/null || true
          fi

      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-results
          path: bandit-results.json

  # =============================================================================
  # Dependency Vulnerability Scanning (Trivy)
  # =============================================================================
  trivy-dependency-scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Clean up Docker disk space
        run: |
          docker system df
          docker system prune -af --volumes || true
          docker builder prune -af || true
          rm -rf /tmp/trivy-* 2>/dev/null || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set repository name to lowercase
        id: repo-name
        run: |
          echo "lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Pull cached images from CD pipeline
        id: pull-images
        run: |
          REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower]')
          REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower]')
          SHA=${{ github.sha }}

          # Try pulling existing images from CD pipeline
          echo "Attempting to pull cached images..."
          
          # Backend image
          if docker pull "ghcr.io/${REPO_OWNER}/portkit-backend:${SHA}" 2>/dev/null; then
            echo "✅ Pulled backend image from registry"
            docker tag "ghcr.io/${REPO_OWNER}/portkit-backend:${SHA}" portkit-backend:latest
            BACKEND_PULLED=true
          elif docker pull "ghcr.io/${REPO_LOWER}/portkit-backend:${SHA}" 2>/dev/null; then
            echo "✅ Pulled backend image from registry (full repo path)"
            docker tag "ghcr.io/${REPO_LOWER}/portkit-backend:${SHA}" portkit-backend:latest
            BACKEND_PULLED=true
          else
            echo "⚠️ Backend image not in registry, will build with cache"
            BACKEND_PULLED=false
          fi
          
          # AI Engine image
          if docker pull "ghcr.io/${REPO_OWNER}/portkit-ai-engine:${SHA}" 2>/dev/null; then
            echo "✅ Pulled ai-engine image from registry"
            docker tag "ghcr.io/${REPO_OWNER}/portkit-ai-engine:${SHA}" portkit-ai-engine:latest
            AIENGINE_PULLED=true
          elif docker pull "ghcr.io/${REPO_LOWER}/portkit-ai-engine:${SHA}" 2>/dev/null; then
            echo "✅ Pulled ai-engine image from registry (full repo path)"
            docker tag "ghcr.io/${REPO_LOWER}/portkit-ai-engine:${SHA}" portkit-ai-engine:latest
            AIENGINE_PULLED=true
          else
            echo "⚠️ AI engine image not in registry, will build with cache"
            AIENGINE_PULLED=false
          fi

          # Output for use in subsequent steps
          echo "backend_pulled=${BACKEND_PULLED}" >> $GITHUB_OUTPUT
          echo "aiengine_pulled=${AIENGINE_PULLED}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker images (fallback if not in registry)
        if: steps.pull-images.outputs.backend_pulled == 'false' || steps.pull-images.outputs.aiengine_pulled == 'false'
        run: |
          REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower]')
          SHA=${{ steps.pull-images.outputs.sha }}

          # Build backend if needed
          if [ "${{ steps.pull-images.outputs.backend_pulled }}" == "false" ]; then
            echo "Building backend image with cache..."
            docker build \
              --cache-from=ghcr.io/${REPO_OWNER}/portkit-backend:cache \
              -t portkit-backend:latest \
              -f Dockerfile .
          fi

          # Build AI engine if needed
          if [ "${{ steps.pull-images.outputs.aiengine_pulled }}" == "false" ]; then
            echo "Building AI engine image with cache..."
            docker build \
              --cache-from=ghcr.io/${REPO_OWNER}/portkit-ai-engine:cache \
              -t portkit-ai-engine:latest \
              -f ai-engine/Dockerfile ai-engine/
          fi

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'portkit-backend:latest'
          format: 'json'
          output: 'trivy-backend-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0' # Report only, don't fail workflow
          ignore-unfixed: true

      - name: Run Trivy on AI Engine image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'portkit-ai-engine:latest'
          format: 'json'
          output: 'trivy-ai-engine-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0' # Report only, don't fail workflow
          ignore-unfixed: true

      - name: Run Trivy filesystem scan (Python deps)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs-results.json'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: |
            trivy-*-results.json

      - name: Clean up Docker images
        if: always()
        run: |
          docker rmi portkit-backend:latest portkit-ai-engine:latest 2>/dev/null || true
          docker system prune -af --volumes 2>/dev/null || true

  # =============================================================================
  # Secret Scanning (Gitleaks)
  # =============================================================================
  gitleaks-secret-scan:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v2.3.9

  # =============================================================================
  # Dependency Review (check for vulnerable dependencies in PRs)
  # =============================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  # =============================================================================
  # CodeQL Analysis
  # =============================================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
