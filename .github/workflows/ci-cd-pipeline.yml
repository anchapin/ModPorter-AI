name: CI/CD Pipeline Integration

on:
  workflow_dispatch:
    inputs:
      mod_file:
        description: 'Path to mod file (.jar or .zip) to convert'
        required: true
        type: string
      wait_for_completion:
        description: 'Wait for conversion to complete'
        required: false
        default: 'true'
        type: boolean
      timeout_minutes:
        description: 'Max wait time for conversion (minutes)'
        required: false
        default: '15'
        type: string
      webhook_url:
        description: 'Webhook URL for completion notifications'
        required: false
        type: string

env:
  PORTKIT_API_URL: ${{ vars.PORTKIT_API_URL || 'https://api.portkit.ai' }}
  PORTKIT_API_KEY: ${{ secrets.PORTKIT_API_KEY }}

jobs:
  upload-mod:
    name: Upload Mod File
    runs-on: ubuntu-latest
    outputs:
      conversion_id: ${{ steps.upload.outputs.conversion_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate mod file exists
        id: validate
        run: |
          MOD_FILE="${{ inputs.mod_file }}"
          if [ ! -f "$MOD_FILE" ]; then
            echo "Error: Mod file not found: $MOD_FILE"
            exit 1
          fi
          echo "File: $MOD_FILE"
          echo "Size: $(stat -f%z "$MOD_FILE" 2>/dev/null || stat -c%s "$MOD_FILE") bytes"

      - name: Upload mod file to PortKit
        id: upload
        run: |
          RESPONSE=$(curl -s -X POST "${{ env.PORTKIT_API_URL }}/api/v1/conversions" \
            -H "Authorization: Bearer ${{ env.PORTKIT_API_KEY }}" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@${{ inputs.mod_file }}")

          CONVERSION_ID=$(echo "$RESPONSE" | grep -o '"conversion_id":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$CONVERSION_ID" ]; then
            echo "Error: Failed to upload mod file. Response: $RESPONSE"
            exit 1
          fi

          echo "conversion_id=$CONVERSION_ID" >> $GITHUB_OUTPUT
          echo "Conversion started with ID: $CONVERSION_ID"

  wait-for-conversion:
    name: Wait for Conversion
    runs-on: ubuntu-latest
    needs: upload-mod
    if: inputs.wait_for_completion == 'true'
    timeout-minutes: ${{ inputs.timeout_minutes || '15' }}
    steps:
      - name: Poll conversion status
        run: |
          CONVERSION_ID="${{ needs.upload-mod.outputs.conversion_id }}"
          MAX_ATTEMPTS=$(( {{ inputs.timeout_minutes || '15' }} * 60 / 10 ))
          ATTEMPT=0

          echo "Monitoring conversion: $CONVERSION_ID"
          echo "Max attempts: $MAX_ATTEMPTS (polling every 10s)"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RESPONSE=$(curl -s -X GET "${{ env.PORTKIT_API_URL }}/api/v1/conversions/$CONVERSION_ID" \
              -H "Authorization: Bearer ${{ env.PORTKIT_API_KEY }}")

            STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            PROGRESS=$(echo "$RESPONSE" | grep -o '"progress":[0-9]*' | cut -d':' -f2)
            ERROR=$(echo "$RESPONSE" | grep -o '"error":"[^"]*"' | cut -d'"' -f4)

            echo "Status: $STATUS | Progress: ${PROGRESS:-0}% | Attempt: $ATTEMPT/$MAX_ATTEMPTS"

            if [ "$STATUS" == "complete" ]; then
              echo "Conversion completed successfully!"
              echo "conversion_id=$CONVERSION_ID" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "$STATUS" == "failed" ] || [ -n "$ERROR" ]; then
              echo "Error: Conversion failed - $ERROR"
              echo "Full response: $RESPONSE"
              exit 1
            fi

            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Error: Conversion timed out after $(( MAX_ATTEMPTS * 10 )) seconds"
          exit 1

  download-artifact:
    name: Download Converted Artifact
    runs-on: ubuntu-latest
    needs: [upload-mod, wait-for-conversion]
    if: inputs.wait_for_completion == 'true'
    outputs:
      artifact_path: ${{ steps.download.outputs.artifact_path }}
    steps:
      - name: Download converted artifact
        id: download
        run: |
          CONVERSION_ID="${{ needs.upload-mod.outputs.conversion_id }}"
          OUTPUT_DIR="converted_output"
          mkdir -p "$OUTPUT_DIR"

          curl -s -X GET "${{ env.PORTKIT_API_URL }}/api/v1/conversions/$CONVERSION_ID/download" \
            -H "Authorization: Bearer ${{ env.PORTKIT_API_KEY }}" \
            -o "$OUTPUT_DIR/mod.mcaddon"

          if [ -f "$OUTPUT_DIR/mod.mcaddon" ] && [ -s "$OUTPUT_DIR/mod.mcaddon" ]; then
            echo "artifact_path=$OUTPUT_DIR/mod.mcaddon" >> $GITHUB_OUTPUT
            echo "Artifact downloaded: $OUTPUT_DIR/mod.mcaddon"
            echo "Size: $(stat -f%z "$OUTPUT_DIR/mod.mcaddon" 2>/dev/null || stat -c%s "$OUTPUT_DIR/mod.mcaddon") bytes"
          else
            echo "Error: Failed to download artifact"
            exit 1
          fi

      - name: Upload artifact to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: portkit-converted-mod
          path: ${{ needs.download-artifact.outputs.artifact_path }}
          retention-days: 7

  notify-webhook:
    name: Notify Webhook
    runs-on: ubuntu-latest
    needs: [upload-mod, wait-for-conversion, download-artifact]
    if: inputs.webhook_url != ''
    steps:
      - name: Send webhook notification
        run: |
          CONVERSION_ID="${{ needs.upload-mod.outputs.conversion_id }}"
          STATUS="complete"

          curl -s -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"conversion_id\": \"$CONVERSION_ID\", \"status\": \"$STATUS\", \"repository\": \"${{ github.repository }}\", \"run_id\": \"${{ github.run_id }}\"}"

  summary:
    name: CI/CD Pipeline Summary
    runs-on: ubuntu-latest
    needs: [upload-mod, wait-for-conversion, download-artifact]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## PortKit CI/CD Pipeline Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| ---- | ------ |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload Mod | ${{ needs.upload-mod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Wait for Conversion | ${{ needs.wait-for-conversion.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Download Artifact | ${{ needs.download-artifact.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.wait-for-conversion.result }}" == "success" ]; then
            echo "✅ Conversion completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Conversion failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi