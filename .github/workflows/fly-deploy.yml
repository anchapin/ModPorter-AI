name: Deploy to Fly.io

on:
  push:
    branches: [staging, main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip smoke tests'
        type: boolean
        default: false

jobs:
  # ============================================
  # DEPLOY TO FLY.IO - Parallel environments
  # ============================================

  deploy:
    name: Deploy ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: staging
            app_name: portkit-backend-staging
            api_url: https://staging-api.portkit.cloud
          - environment: production
            app_name: portkit-backend
            api_url: https://api.portkit.cloud

    steps:
      - name: Determine whether this matrix target should deploy
        id: should_deploy
        run: |
          deploy=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ matrix.environment }}" = "${{ inputs.environment }}" ]; then
            deploy=true
          elif [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ matrix.environment }}" = "staging" ] && [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            deploy=true
          elif [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ matrix.environment }}" = "production" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; }; then
            deploy=true
          fi
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          if [ "$deploy" != "true" ]; then
            echo "Skipping ${{ matrix.environment }} for ${{ github.ref }} (${{ github.event_name }})"
          fi

      - name: Checkout code
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: actions/checkout@v6

      - name: Initialize deployment performance tracking
        if: steps.should_deploy.outputs.deploy == 'true'
        id: deploy_metrics
        run: |
          echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV
          echo "Environment: ${{ matrix.environment }}"
          echo "App: ${{ matrix.app_name }}"

      - name: Deploy to Fly.io
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: superfly/flyctl-actions@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        with:
          args: "deploy --app ${{ matrix.app_name }} --remote-only"

      - name: Wait for deployment to complete
        if: steps.should_deploy.outputs.deploy == 'true'
        run: |
          echo "Waiting for Fly.io deployment to complete..."
          sleep 30

      - name: Health check
        if: steps.should_deploy.outputs.deploy == 'true'
        env:
          API_URL: ${{ matrix.api_url }}
        run: |
          max_attempts=10
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt/$max_attempts: Checking health..."
            if curl -f -s "$API_URL/health" > /dev/null 2>&1; then
              echo "✓ Health check passed"
              exit 0
            fi
            attempt=$((attempt + 1))
            sleep 10
          done
          echo "✗ Health check failed after $max_attempts attempts"
          exit 1

      - name: Run smoke tests
        if: steps.should_deploy.outputs.deploy == 'true' && !inputs.skip_tests
        env:
          API_URL: ${{ matrix.api_url }}
        run: |
          echo "Running smoke tests..."

          # Test API health endpoint
          echo "Testing API health..."
          curl -f -s "$API_URL/health" || exit 1

          # Test root endpoint
          echo "Testing root endpoint..."
          curl -f -s "$API_URL/" | head -5 || exit 1

          # Test websocket endpoint (optional, don't fail)
          echo "Testing WebSocket endpoint..."
          timeout 5 curl -s "$API_URL/ws" || true

          echo "✓ Smoke tests passed"

      - name: Record deployment time
        if: always() && steps.should_deploy.outputs.deploy == 'true'
        run: |
          DEPLOY_END=$(date +%s)
          DEPLOY_START=${{ env.DEPLOY_START }}
          if [ -n "$DEPLOY_START" ]; then
            DURATION=$((DEPLOY_END - DEPLOY_START))
            echo "## Deployment Metrics" >> $GITHUB_STEP_SUMMARY
            echo "- Environment: ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
            echo "- Duration: ${DURATION}s" >> $GITHUB_STEP_SUMMARY
            echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify deployment status
        if: always() && steps.should_deploy.outputs.deploy == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const status = '${{ job.status }}';
            const env = '${{ matrix.environment }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const summary = `
              ## ${emoji} Deployment Status

              **Environment:** ${env}
              **Status:** ${status}
              **Commit:** ${{ github.sha }}
              **Branch:** ${{ github.ref_name }}
            `;

            core.summary.addRaw(summary);

            if (status === 'success') {
              core.notice('Deployment to ' + env + ' completed successfully!');
            } else {
              core.setFailed('Deployment to ' + env + ' failed!');
            }
