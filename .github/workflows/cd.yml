name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # Build Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=v(\d+\.\d+\.\d+),group=1

      - name: Build and push backend
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}-backend
            ${{ env.REGISTRY }}/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push ai-engine
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./ai-engine/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}-ai-engine
            ${{ env.REGISTRY }}/${{ github.repository }}-ai-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}-frontend
            ${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}
          subject-digest: sha256:${{ steps.build.outputs.digest }}
          predicate-type: https://slsa.dev/provenance/v1

  # Run staging deployment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Kubernetes
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."

          # Update image tags in Kubernetes manifests
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ github.repository }}-backend:${{ github.sha }} \
            --namespace=staging
            
          kubectl set image deployment/ai-engine \
            ai-engine=${{ env.REGISTRY }}/${{ github.repository }}-ai-engine:${{ github.sha }} \
            --namespace=staging
            
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ github.sha }} \
            --namespace=staging

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl rollout status deployment/backend --namespace=staging --timeout=300s
          kubectl rollout status deployment/ai-engine --namespace=staging --timeout=300s
          kubectl rollout status deployment/frontend --namespace=staging --timeout=300s

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Test health endpoint
          curl -f https://staging.modporter.ai/health || exit 1
          # Test API endpoint
          curl -f https://staging.api.modporter.ai/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deployment completed"

  # Run production deployment
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment: production
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Kubernetes
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

      - name: Deploy to production
        run: |
          echo "Deploying to production..."

          # Update image tags in Kubernetes manifests
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ github.repository }}-backend:${{ github.sha }} \
            --namespace=production
            
          kubectl set image deployment/ai-engine \
            ai-engine=${{ env.REGISTRY }}/${{ github.repository }}-ai-engine:${{ github.sha }} \
            --namespace=production
            
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ github.sha }} \
            --namespace=production

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl rollout status deployment/backend --namespace=production --timeout=600s
          kubectl rollout status deployment/ai-engine --namespace=production --timeout=600s
          kubectl rollout status deployment/frontend --namespace=production --timeout=600s

      - name: Run smoke tests
        run: |
          echo "Running production smoke tests..."
          # Test health endpoint
          curl -f https://modporter.ai/health || exit 1
          # Test API endpoint
          curl -f https://api.modporter.ai/health || exit 1

      - name: Create release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Creating release ${{ github.ref }}"
          # Create GitHub release with deployment info
          gh release create ${{ github.ref }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

  # Notify on deployment status
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment status: ${{ needs.deploy-staging.result }}, ${{ needs.deploy-production.result }}"
