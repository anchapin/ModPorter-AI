# GitHub Actions CI/CD Pipeline for ModPorter AI
# Optimized for parallel execution

name: Deploy ModPorter AI

'on':
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================
  # PARALLEL TEST JOBS - Split for speed
  # ============================================

  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: modporter_test
        options: >-
          --health-cmd "pg_isready -U postgres -d modporter_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip setuptools wheel --no-cache-dir
          pip install -r requirements.txt -r requirements-dev.txt --no-cache-dir

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until nc -z localhost 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done'
          timeout 60 bash -c 'until echo "PING" | nc localhost 6379 | grep -q PONG; do echo "Waiting for Redis..."; sleep 2; done'

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:***@localhost:5432/modporter_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test_secret_key
          JWT_SECRET_KEY: test_jwt_secret
          TESTING: true
          CI: true
        run: |
          cd backend
          python -m pytest src/tests/ -v --cov=src --cov-report=xml --timeout=120 --ignore=src/tests/unit/test_task_worker_coverage.py

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./backend/coverage.xml
          flags: backend

  ai-engine-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ai-engine-${{ hashFiles('ai-engine/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ai-engine-

      - name: Install AI engine dependencies
        timeout-minutes: 15
        run: |
          cd ai-engine
          pip install --upgrade pip setuptools wheel --no-cache-dir
          pip install -r requirements.txt -r requirements-dev.txt --no-cache-dir

      - name: Wait for Redis
        run: |
          timeout 60 bash -c 'until echo "PING" | nc localhost 6379 | grep -q PONG; do echo "Waiting for Redis..."; sleep 2; done'

      - name: Run AI engine tests
        env:
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test_key' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test_key' }}
          TESTING: true
          CI: true
        run: |
          cd ai-engine
          python -m pytest -c pytest.ini tests/ -v --cov=. --cov-report=xml --timeout=300 -m "not slow and not ai"

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./ai-engine/coverage.xml
          flags: ai-engine

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Run frontend tests
        run: |
          cd frontend
          pnpm run test:ci

      - name: Frontend type check
        run: |
          cd frontend
          pnpm exec tsc --noEmit

      - name: Frontend lint check
        run: |
          cd frontend
          pnpm run lint

      - name: Build frontend
        run: |
          cd frontend
          pnpm run build

  # ============================================
  # SECURITY SCAN - Runs in parallel with tests
  # ============================================
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          version: 'latest'
          exit-code: '0' # Report only, don't fail workflow
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'
          skip-dirs: '.github,docs,tests,scripts,node_modules,.venv,frontend/node_modules,ai-engine/.venv,backend/.venv'
          skip-files: '**/node_modules/**,**/.venv/**,**/dist/**,**/build/**,.worktrees/**,frontend/package-lock.json'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit security linter (Backend)
        run: |
          pip install --timeout=300 bandit
          bandit -r backend/src/ -f json -o bandit-backend.json || true

      - name: Run Bandit security linter (AI Engine)
        run: |
          bandit -r ai-engine/ -f json -o bandit-ai.json || true

  # ============================================
  # DOCKER BUILD - Parallel using matrix
  # ============================================
  build:
    needs: [backend-test, ai-engine-test, frontend-test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend, ai-engine]
        include:
          - service: frontend
            context: ./frontend
            image: modporter/frontend
          - service: backend
            context: ./backend
            image: modporter/backend
          - service: ai-engine
            context: ./ai-engine
            image: modporter/ai-engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize performance tracking
        run: |
          echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record build time
        if: always()
        run: |
          BUILD_END=$(date +%s)
          BUILD_START=${{ env.BUILD_START }}
          if [ -n "$BUILD_START" ]; then
            DURATION=$((BUILD_END - BUILD_START))
            echo "📊 Build ${{ matrix.service }} completed in ${DURATION}s"
          fi

      - name: Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-metrics-build-${{ matrix.service }}
          path: .github/perf-metrics/*.json
          retention-days: 30

  # ============================================
  # DEPLOY - Runs after successful build
  # ============================================
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize deployment performance tracking
        run: |
          echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          scp -r . $SERVER_USER@$SERVER_HOST:/opt/modporter-ai/

          ssh $SERVER_USER@$SERVER_HOST << 'EOF'
            cd /opt/modporter-ai

            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env.prod
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env.prod
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env.prod
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env.prod
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env.prod
            echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env.prod
            echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" >> .env.prod

            ./scripts/deploy.sh production
          EOF

      - name: Run health checks
        run: |
          sleep 60

          curl -f http://${{ secrets.SERVER_HOST }}/api/v1/health
          curl -f http://${{ secrets.SERVER_HOST }}:8001/api/v1/health
          curl -f http://${{ secrets.SERVER_HOST }}/health

      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

      - name: Record deployment time
        if: always()
        run: |
          DEPLOY_END=$(date +%s)
          DEPLOY_START=${{ env.DEPLOY_START }}
          if [ -n "$DEPLOY_START" ]; then
            DURATION=$((DEPLOY_END - DEPLOY_START))
            echo "📊 Deployment completed in ${DURATION}s"
            ./scripts/ci-performance-tracker.sh record "Server Deployment" "$DEPLOY_START" "$DEPLOY_END" || true
          fi

      - name: Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-metrics-deploy
          path: .github/perf-metrics/*.json
          retention-days: 30

  # ============================================
  # ROLLBACK - Runs on deployment failure
  # ============================================
  rollback:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/production'
    needs: [deploy]
    environment: production

    steps:
      - name: Rollback deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << 'EOF'
            cd /opt/modporter-ai

            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
          EOF
