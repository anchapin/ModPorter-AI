[pytest]
testpaths =
    tests
    backend/tests
    ai-engine/tests
    ai-engine/src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath =
    backend/src
    ai-engine/src
    .
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --asyncio-mode=auto
env =
    TESTING = true
    DATABASE_URL = postgresql+asyncpg://postgres:password@localhost:5433/modporter
    REDIS_URL = redis://localhost:6379/0
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = function
markers =
    asyncio: Async tests
    integration: Integration tests
    integration_docker: Docker integration tests
    unit: Unit tests
    slow: Slow running tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pytest_asyncio.plugin.PytestDeprecationWarning

# NOTE: Coverage is configured in backend/pytest.ini (80% threshold)
# and ai-engine/pytest.ini (40% threshold) which run actual test suites.
# This root pytest.ini is for legacy reference; actual CI uses service-specific configs.