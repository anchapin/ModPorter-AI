[pytest]
testpaths = src/tests
pythonpath = src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=json:coverage.json
    --cov-fail-under=80
    --timeout=300
    --ignore=src/tests/integration
    --ignore=src/tests/test_analyzer.py
    --ignore=src/tests/test_comparison_api.py
    --ignore=src/tests/test_websocket_integration.py
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    asyncio: Async tests
    real_service: Tests that require real services (PostgreSQL, Redis) - skipped unless USE_REAL_SERVICES=1
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
