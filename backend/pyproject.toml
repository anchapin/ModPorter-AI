[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.mypy]
python_version = "3.11"
strict = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_return_any = false
warn_unreachable = false
pretty = true
show_error_codes = true
namespace_packages = true
explicit_package_bases = true
exclude = ["tests/", "scripts/", ".venv/", "docs/", "examples/", "__pycache__/", "__main__.py"]

[tool.mutmut]
paths_to_mutate = ["src"]


[[tool.mypy.overrides]]
module = "sqlalchemy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "alembic.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "asyncpg.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pydantic.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "fastapi.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "uvicorn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "httpx.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "redis.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "celery.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "psycopg2.*"
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    "tests/",
    "src/tests/",
    ".git/",
    "__pycache__/",
    "*.egg-info/",
    ".venv/",
    "venv/",
    "mutants/",  # mutation testing generates code with odd names
]

[tool.ruff.lint]
# Enable pycodestyle (E), Pyflakes (F), warnings (W), isort (I), flake8-quotes (Q), flake8-naming (N), pydocstyle (D), pyupgrade (UP), mccabe (C901), flake8-simplify (SIM), flake8-2020 (T20)
select = ["E", "F", "W", "I", "Q", "N", "D", "UP", "C901", "SIM", "T20"]
ignore = [
    "E402",  # module level import not at top of file
    "E501",  # line too long (handled by formatter)
    # W (pycodestyle warnings) ignores for legacy code
    "W291",  # trailing whitespace (legacy code has inconsistent whitespace)
    "W292",  # no newline at end of file (legacy code has inconsistent newlines)
    "W293",  # blank line contains whitespace (legacy code has inconsistent blank lines)
    "Q000",  # bad quote marks
    "Q001",  # bad quote marks in multiline strings
    "Q002",  # bad quote marks in strings
    "N999",  # invalid module name (allow hyphenated names like ai-engine)
    "I001",  # import block is un-sorted (legacy code has inconsistent import order)
    "F541",  # f-string without placeholders (legacy code uses f-strings for comments)
    "F601",  # duplicate dictionary key (legacy code has intentional overrides)
    "F811",  # redefinition of function (legacy code has intentional overrides)
    "Q003",  # unnecessary escape on inner quote character
    "Q004",  # unnecessary escape on inner quote character
    "E702",  # multiple statements on one line (semicolon)
    "E701",  # multiple statements on one line (colon)
    "E722",  # bare except (legacy code uses bare except for compatibility)
    "E713",  # test for membership should be `not in`
    "F821",  # undefined name (type hints and forward references)
    # pydocstyle (D) ignores for legacy code
    "D100",  # Missing docstring in public module
    "D101",  # Missing docstring in public class
    "D102",  # Missing docstring in public method
    "D103",  # Missing docstring in public function
    "D104",  # Missing docstring in public package
    "D105",  # Missing docstring in magic method
    "D106",  # Missing docstring in public nested class
    "D107",  # Missing docstring in __init__
    "D200",  # One-line docstring should fit on one line with quotes
    "D205",  # 1 blank line required between summary line and description
    "D400",  # First line should end with a period
    "D401",  # First line should be in imperative mood
    "D415",  # First line should end with a period, question mark, or exclamation point
    # pydocstyle additional ignores for legacy code
    "D204",  # 1 blank line required after class docstring
    "D203",  # 1 blank line required before class docstring (conflicts with D211)
    "D212",  # Multi-line docstring summary should start at the first line
    "D213",  # Multi-line docstring summary should start at the second line
    "D413",  # Missing blank line after last section
    # pyupgrade (UP) ignores for legacy code
    "UP035",  # deprecated typing imports (List, Dict, etc.)
    "UP006",  # use built-in types instead of typing (not yet enforced)
    "UP015",  # unnecessary mode argument in open()
    "UP024",  # replace IOError with OSError
    "UP032",  # use f-string instead of format() call
    "UP045",  # use X | None instead of Optional[X]
    "UP017",  # use datetime.UTC instead of datetime.now(timezone.utc)
    "UP042",  # inherit from enum.StrEnum instead of str, Enum
    # pydocstyle (D) additional ignores for legacy code
    "D202",  # no blank lines allowed after function docstring
    "D406",  # section name should end with a newline
    "D409",  # section underline should match the length of its name
    # flake8-simplify rules we don't want (duplicate code patterns via SIM)
    "SIM108",  # Use ternary operator (if/else is clearer in some cases)
    "SIM115",  # Use context handler for opening files (disagree)
    "SIM102",  # nested if statements (legacy code style)
    "SIM103",  # return condition directly (legacy code style)
    "SIM105",  # use contextlib.suppress (legacy code style)
    "SIM110",  # use any() with generator (legacy code style)
    "SIM114",  # combine if branches (legacy code style)
    "SIM117",  # combine with statements (legacy code style)
    "SIM118",  # key in dict instead of dict.keys() (legacy code style)
    # flake8-2020 rules
    "T201",  # print statements (legacy debug code)
    "F841",  # unused variable (common in exception handling)
    "F401",  # unused import (common with optional dependencies) - also added in per-file-ignores
    "N818",  # Exception name should end with Error (legacy code style)
    "E712",  # avoid equality comparisons to True (legacy code style)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402", "F401", "F841", "E712"]  # Allow imports not at top, unused imports/variables, and == True/False in tests
"__init__.py" = ["E402"]
"src/api/performance.py" = ["F821", "F841"]  # Undefined name and unused variable
"src/services/rate_limiter.py" = ["F841"]
"src/services/task_worker.py" = ["F841"]
"src/file_processor.py" = ["N806", "C901"]
"src/services/conversion_parser.py" = ["C901"]
"src/api/assets.py" = ["C901"]
"src/api/behavior_export.py" = ["C901"]
"src/api/rate_limit_dashboard.py" = ["C901"]
"src/java_analyzer_agent.py" = ["C901"]
"src/services/comprehensive_report_generator.py" = ["C901"]
"src/services/conversion_service.py" = ["C901"]
"src/services/java_parser.py" = ["C901"]
"src/services/retry.py" = ["C901"]
"src/services/syntax_validator.py" = ["C901"]
"src/services/task_queue_enhanced.py" = ["C901"]
"src/utils/debt_tracker.py" = ["C901"]
"src/utils/dependency_detector.py" = ["C901"]
"main.py" = ["C901"]
"src/main.py" = ["N811", "C901"]
"src/security/file_security.py" = ["C901"]
"src/services/addon_exporter.py" = ["C901"]
"src/api/validation.py" = ["C901"]
"src/api/upload.py" = ["N806"]  # MAX_UPLOAD_SIZE constant
"src/api/embeddings.py" = ["D417", "D407"]  # Missing docstring args (legacy)
"src/api/knowledge_base.py" = ["D417"]  # Missing docstring args (legacy)
"src/models/conversion_mode.py" = ["N815"]  # Minecraft field names (has_GUI, has_ASM, etc.)
# Naming convention per-file ignores (legacy code)
"src/api/conversions.py" = ["N805", "C901"]  # First arg of method should be self (validators use cls)
"src/utils/validators.py" = ["N805"]  # First arg of method should be self (validators use cls)
"src/models/types.py" = ["N811"]  # constant imported as non-constant (PyUUID, SQLiteJSON)
"src/models/addon_models.py" = ["N811"]  # constant imported as non-constant (PyUUID)
"src/db/models.py" = ["N811"]  # constant imported as non-constant (SQLiteJSON)
"src/db/crud.py" = ["N811"]  # constant imported as non-constant (PyUUID)
"src/security/resource_limits.py" = ["N818"]  # exception names should have Error suffix (legacy names)
"src/services/error_handlers.py" = ["N818", "C901"]  # exception names should have Error suffix (legacy names)
"src/exceptions.py" = ["N818"]  # exception names should have Error suffix (legacy names)
"src/services/*.py" = ["N806"]  # variable in function should be lowercase (constants in functions)
"src/services/celery_tasks.py" = ["C901"]

[tool.ruff.lint.isort]
known-first-party = ["app", "core", "src"]
force-single-line = false

[tool.ruff.lint.mccabe]
max-complexity = 20
